<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Línea dinámica con plano cartesiano</title>
</head>
<body>

<h2 style="text-align:center;">Línea Dinámica</h2>
<h3>Realizado por Alexander Marocho</h3>

<canvas id="myCanvas" width="800" height="400" style="border: 1px solid black;"></canvas>

<script>
var canvas = document.getElementById("myCanvas");
var ctx = canvas.getContext("2d");

var xstart = 0;
var xend = canvas.width;
var step = 0.5;
var time = 0;

// Plano cartesiano
function drawAxes() {
    ctx.beginPath();
    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;

    // Eje X
    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2);

    // Eje Y
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);

    ctx.stroke();
}

// Función seno
function drawGraph() {
    ctx.beginPath();
    ctx.strokeStyle = "blue";
    ctx.lineWidth = 2;

    let firstPoint = true;

    for (let x = xstart; x < xend; x += step) {
        let y = Math.sin(x * 0.01 + time);
        let canvasY = canvas.height / 2 - y * 100;

        if (firstPoint) {
            ctx.moveTo(x, canvasY);
            firstPoint = false;
        } else {
            ctx.lineTo(x, canvasY);
        }
    }

    ctx.stroke();
}

//Animación
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawAxes();
    drawGraph();

    time += 0.08;
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
